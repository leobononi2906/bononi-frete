<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frete — Bononi Acessórios</title>
<style>
  :root {
    --bg:        #0f1117;
    --surface:   #181c25;
    --surface2:  #1e2330;
    --border:    #2a2f3f;
    --accent:    #f59e0b;
    --accent2:   #10b981;
    --danger:    #ef4444;
    --warn:      #f97316;
    --text:      #e8eaf0;
    --muted:     #6b7280;
    --blue:      #3b82f6;
    --font:      'Inter', system-ui, sans-serif;
    --mono:      'JetBrains Mono', 'Fira Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* SIDEBAR */
  #sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 0;
  }
  .sidebar-logo {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo .brand {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    display: block;
    margin-bottom: 4px;
  }
  .sidebar-logo .title {
    font-size: 17px;
    font-weight: 700;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sidebar-logo .title span { font-size: 20px; }
  nav { flex: 1; padding: 12px 8px; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13.5px;
    color: var(--muted);
    margin-bottom: 2px;
    transition: all .15s;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active {
    background: rgba(245,158,11,.12);
    color: var(--accent);
    border-color: rgba(245,158,11,.25);
  }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-footer {
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
  }

  /* MAIN */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 56px;
  }
  .topbar h1 { font-size: 16px; font-weight: 600; }
  .topbar .subtitle { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .page-content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  /* AUTH */
  #auth-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px;
    width: 360px;
    text-align: center;
  }
  .auth-card .logo { font-size: 36px; margin-bottom: 8px; }
  .auth-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; color: var(--accent); }
  .auth-card p { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .auth-card input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 14px;
    color: var(--text);
    margin-bottom: 12px;
    outline: none;
  }
  .auth-card input:focus { border-color: var(--accent); }
  .auth-error { color: var(--danger); font-size: 13px; margin-bottom: 10px; min-height: 20px; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px; border-radius: 8px; font-size: 13.5px;
    font-weight: 600; cursor: pointer; border: none; transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #fbbf24; }
  .btn-full { width: 100%; justify-content: center; }
  .btn-sm { padding: 7px 14px; font-size: 12.5px; }
  .btn-ghost {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: rgba(239,68,68,.15); color: var(--danger); border: 1px solid rgba(239,68,68,.3); }
  .btn-danger:hover { background: rgba(239,68,68,.25); }
  .btn-success { background: rgba(16,185,129,.15); color: var(--accent2); border: 1px solid rgba(16,185,129,.3); }

  /* CARDS GRID */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
  }
  .stat-card .label { font-size: 11.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
  .stat-card .value { font-size: 26px; font-weight: 700; }
  .stat-card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .stat-card.warn .value { color: var(--warn); }
  .stat-card.ok .value { color: var(--accent2); }
  .stat-card.info .value { color: var(--blue); }

  /* FORM */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .8px;
    color: var(--muted); margin-bottom: 18px;
    display: flex; align-items: center; gap: 8px;
  }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 16px;
  }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: var(--muted); }
  .field input, .field select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    color: var(--text);
    outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: var(--surface2); }

  /* RESULTADOS COTAÇÃO */
  .result-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    margin-top: 16px;
  }
  .result-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    position: relative;
  }
  .result-card.winner {
    border-color: var(--accent2);
    background: rgba(16,185,129,.06);
  }
  .result-card .badge-winner {
    position: absolute; top: -8px; right: 12px;
    background: var(--accent2); color: #000;
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 20px;
  }
  .result-card .transp { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .result-card .prazo { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .result-card .preco { font-size: 22px; font-weight: 800; }
  .result-card.winner .preco { color: var(--accent2); }
  .result-card .detalhe { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .result-card.error-card { border-color: rgba(239,68,68,.3); }
  .result-card.error-card .preco { color: var(--danger); font-size: 14px; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    text-align: left;
    padding: 10px 12px;
    background: var(--surface2);
    color: var(--muted);
    font-size: 11.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .6px;
    border-bottom: 1px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 10px 12px; }
  .badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-ok { background: rgba(16,185,129,.15); color: var(--accent2); }
  .badge-warn { background: rgba(249,115,22,.15); color: var(--warn); }
  .badge-danger { background: rgba(239,68,68,.15); color: var(--danger); }
  .badge-gray { background: rgba(107,114,128,.15); color: var(--muted); }
  .badge-blue { background: rgba(59,130,246,.15); color: var(--blue); }

  /* LOGS */
  .log-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .log-item:hover { border-color: var(--accent); }
  .log-item.log-erro { border-left: 3px solid var(--danger); }
  .log-item.log-acao { border-left: 3px solid var(--accent2); }
  .log-item.log-aviso { border-left: 3px solid var(--warn); }
  .log-icon { font-size: 18px; margin-top: 1px; }
  .log-body { flex: 1; }
  .log-desc { font-size: 13.5px; margin-bottom: 4px; }
  .log-meta { font-size: 11.5px; color: var(--muted); display: flex; gap: 14px; flex-wrap: wrap; }
  .log-detail {
    margin-top: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 11.5px;
    color: #a5b4fc;
    white-space: pre-wrap;
    display: none;
    max-height: 200px;
    overflow-y: auto;
  }
  .log-detail.open { display: block; }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filters select, .filters input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    color: var(--text);
    outline: none;
  }
  .filters select:focus, .filters input:focus { border-color: var(--accent); }

  /* LOADER */
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-area {
    display: flex; align-items: center; gap: 12px;
    padding: 20px; color: var(--muted); font-size: 13px;
  }

  /* TOAST */
  #toast-container {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 999;
  }
  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
    animation: slideIn .2s ease;
    min-width: 260px;
  }
  .toast.success { border-left: 3px solid var(--accent2); }
  .toast.error { border-left: 3px solid var(--danger); }
  .toast.info { border-left: 3px solid var(--blue); }
  @keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }

  /* MISC */
  .text-muted { color: var(--muted); }
  .text-accent { color: var(--accent); }
  .text-green { color: var(--accent2); }
  .text-red { color: var(--danger); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
  .hidden { display: none !important; }
  .flex { display: flex; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .mb-2 { margin-bottom: 8px; }
  .mb-3 { margin-bottom: 12px; }
  .mb-4 { margin-bottom: 16px; }
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 42px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }
  .tag { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 11px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); margin-right: 4px; }
  hr.section { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="logo">🚚</div>
    <h2>App de Frete</h2>
    <p>Grupo Bononi Acessórios</p>
    <input type="email" id="auth-email" placeholder="E-mail" />
    <input type="password" id="auth-pass" placeholder="Senha" />
    <div class="auth-error" id="auth-error"></div>
    <button class="btn btn-primary btn-full" onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sidebar-logo">
    <span class="brand">Bononi Acessórios</span>
    <div class="title"><span>🚚</span> Frete</div>
  </div>
  <nav>
    <div class="nav-item active" onclick="goto('cotacao')" id="nav-cotacao">
      <span class="icon">💰</span> Cotar Frete
    </div>
    <div class="nav-item" onclick="goto('auditoria')" id="nav-auditoria">
      <span class="icon">🧾</span> Auditoria CTe
    </div>
    <div class="nav-item" onclick="goto('cotacoes')" id="nav-cotacoes">
      <span class="icon">📋</span> Histórico
    </div>
    <div class="nav-item" onclick="goto('logs')" id="nav-logs">
      <span class="icon">🔍</span> Logs do Sistema
    </div>
  </nav>
  <div class="sidebar-footer">
    <div id="sidebar-user" style="margin-bottom:6px;font-weight:600;color:var(--text)"></div>
    <div style="cursor:pointer;color:var(--muted)" onclick="sair()">Sair →</div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="topbar">
    <div>
      <h1 id="page-title">Cotar Frete</h1>
      <div class="subtitle" id="page-sub">Comparativo em tempo real entre transportadoras</div>
    </div>
    <div class="flex gap-2 items-center">
      <div id="topbar-badge"></div>
    </div>
  </div>

  <div class="page-content" id="page-content">
    <!-- Renderizado via JS -->
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script>
const SUPA_URL = 'https://vishxwdxqiygbxmtpfoy.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpc2h4d2R4cWl5Z2J4bXRwZm95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Njg2MjIsImV4cCI6MjA4ODA0NDYyMn0.J647m3ieDHahNQYBWMRESl0aPFXsT_zt_7ZcDvyB-SA';
const EDGE_URL = 'https://vishxwdxqiygbxmtpfoy.supabase.co/functions/v1';

let session = null;
let userName = '';
let currentPage = 'cotacao';

// ──────────────────────────────────────────────────
// HELPERS
// ──────────────────────────────────────────────────
function headers(token) {
  const h = {
    'apikey': SUPA_KEY,
    'Content-Type': 'application/json'
  };
  if (token) h['Authorization'] = `Bearer ${token}`;
  else h['Authorization'] = `Bearer ${SUPA_KEY}`;
  return h;
}

async function supa(path, opts = {}) {
  const sep = path.includes('?') ? '&' : '?';
  const url = `${SUPA_URL}/rest/v1/${path}${sep}limit=9999`;
  const res = await fetch(url, { headers: headers(session?.access_token), ...opts });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Supabase ${res.status}: ${err}`);
  }
  return res.json();
}

function fmt(v) {
  if (v == null) return '—';
  return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}
function fmtNum(v) {
  if (v == null) return '—';
  return Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('pt-BR');
}
function fmtDatetime(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('pt-BR');
}

function toast(msg, type = 'info') {
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]}</span> ${msg}`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ──────────────────────────────────────────────────
// SISTEMA DE LOGS
// ──────────────────────────────────────────────────
async function appLog(tipo, descricao, detalhe = {}) {
  try {
    await fetch(`${SUPA_URL}/rest/v1/frt_logs`, {
      method: 'POST',
      headers: { ...headers(session?.access_token), 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        tipo,
        descricao,
        detalhe,
        usuario: userName || 'desconhecido',
        criado_em: new Date().toISOString()
      })
    });
  } catch (e) {
    // silencioso — log não pode quebrar o fluxo
    console.warn('Log falhou:', e.message);
  }
}

// ──────────────────────────────────────────────────
// AUTH
// ──────────────────────────────────────────────────
async function fazerLogin() {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  document.getElementById('auth-error').textContent = '';

  try {
    const res = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.message || 'Erro no login');

    session = data;
    const meta = data.user?.user_metadata || {};
    const isAdmin = meta.admin === true;
    const modulos = meta.modulos || [];
    if (!isAdmin && !modulos.includes('frete')) throw new Error('Sem acesso ao módulo de Frete');

    userName = meta.nome || email.split('@')[0];
    document.getElementById('sidebar-user').textContent = userName;
    document.getElementById('auth-screen').classList.add('hidden');
    await appLog('acao', 'Login realizado', { categoria: 'sistema', email });
    goto('cotacao');
  } catch(e) {
    document.getElementById('auth-error').textContent = e.message;
  }
}

function sair() {
  session = null;
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('auth-pass').value = '';
}

// ──────────────────────────────────────────────────
// NAVEGAÇÃO
// ──────────────────────────────────────────────────
const PAGES = {
  cotacao:   { title: 'Cotar Frete',        sub: 'Comparativo em tempo real entre transportadoras',  fn: renderCotacao },
  auditoria: { title: 'Auditoria de CTes',  sub: 'Conferência de conhecimentos de transporte',        fn: renderAuditoria },
  cotacoes:  { title: 'Histórico de Cotações', sub: 'Todas as cotações realizadas no sistema',        fn: renderHistorico },
  logs:      { title: 'Logs do Sistema',    sub: 'Rastreamento de ações e erros em tempo real',       fn: renderLogs },
};

function goto(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`nav-${page}`)?.classList.add('active');
  const p = PAGES[page];
  document.getElementById('page-title').textContent = p.title;
  document.getElementById('page-sub').textContent = p.sub;
  p.fn();
}

// ──────────────────────────────────────────────────
// PAGE: COTAÇÃO
// ──────────────────────────────────────────────────
async function renderCotacao() {
  const c = document.getElementById('page-content');
  c.innerHTML = `<div class="loading-area"><div class="spinner"></div> Carregando locais...</div>`;

  let locais = [];
  try {
    locais = await supa('frt_locais_expedicao?select=*&ativo=eq.true&order=nome');
  } catch(e) {
    await appLog('erro', 'Falha ao carregar locais de expedição', { categoria: 'cotacao', detalhe: e.message });
    c.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${e.message}</p></div>`;
    return;
  }

  c.innerHTML = `
    <div class="card">
      <div class="card-title">📦 Dados do Embarque</div>
      <div class="form-grid">
        <div class="field">
          <label>Local de Expedição</label>
          <select id="id_local">
            ${locais.map(l => `<option value="${l.id}">${l.nome} — ${l.cidade}/${l.uf}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>CEP Destino</label>
          <input type="text" id="cep_destino" placeholder="00000-000" maxlength="9" oninput="formatCEP(this)" />
        </div>
        <div class="field">
          <label>CNPJ Destinatário</label>
          <input type="text" id="cnpj_dest" placeholder="00.000.000/0000-00" maxlength="18" oninput="formatCNPJ(this)" />
        </div>
        <div class="field">
          <label>Valor da NF (R$)</label>
          <input type="number" id="valor_nf" placeholder="0,00" step="0.01" min="0" />
        </div>
      </div>
      <hr class="section">
      <div class="card-title">📐 Volumes / Peso</div>
      <div id="volumes-list"></div>
      <button class="btn btn-ghost btn-sm" style="margin-top:4px" onclick="addVolume()">+ Adicionar Volume</button>

}

let volumeIdx = 0;
function addVolume() {
  volumeIdx++;
  const i = volumeIdx;
  const list = document.getElementById('volumes-list');
  if (!list) return;
  const div = document.createElement('div');
  div.id = `vol-${i}`;
  div.style.cssText = 'background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;';
  div.innerHTML = `
    <div class="flex justify-between items-center mb-3">
      <span style="font-size:12px;font-weight:700;color:var(--muted)">VOLUME ${i}</span>
      ${i > 1 ? `<button class="btn btn-danger btn-sm" onclick="document.getElementById('vol-${i}').remove()">Remover</button>` : ''}
    </div>
    <div class="form-grid">
      <div class="field"><label>Qtd Volumes</label><input type="number" id="qtd-${i}" value="1" min="1" /></div>
      <div class="field"><label>Peso (kg)</label><input type="number" id="peso-${i}" placeholder="0.0" step="0.001" min="0" /></div>
      <div class="field"><label>Altura (cm)</label><input type="number" id="alt-${i}" placeholder="0" min="0" /></div>
      <div class="field"><label>Largura (cm)</label><input type="number" id="larg-${i}" placeholder="0" min="0" /></div>
      <div class="field"><label>Comprimento (cm)</label><input type="number" id="comp-${i}" placeholder="0" min="0" /></div>
    </div>
  `;
  list.appendChild(div);
}

function formatCEP(el) {
  let v = el.value.replace(/\D/g,'');
  if (v.length > 5) v = v.slice(0,5)+'-'+v.slice(5,8);
  el.value = v;
}

function formatCNPJ(el) {
  let v = el.value.replace(/\D/g,'').slice(0,14);
  if (v.length > 12) v = v.slice(0,2)+'.'+v.slice(2,5)+'.'+v.slice(5,8)+'/'+v.slice(8,12)+'-'+v.slice(12);
  else if (v.length > 8) v = v.slice(0,2)+'.'+v.slice(2,5)+'.'+v.slice(5,8)+'/'+v.slice(8);
  else if (v.length > 5) v = v.slice(0,2)+'.'+v.slice(2,5)+'.'+v.slice(5);
  else if (v.length > 2) v = v.slice(0,2)+'.'+v.slice(2);
  el.value = v;
}

async function cotar() {
  const id_local  = parseInt(document.getElementById('id_local').value);
  const cep       = document.getElementById('cep_destino').value.replace(/\D/g,'');
  const cnpj      = document.getElementById('cnpj_dest').value.replace(/\D/g,'');
  const valor_nf  = parseFloat(document.getElementById('valor_nf').value) || 0;

  if (!cep || cep.length < 8) { toast('Informe o CEP destino', 'error'); return; }

  const pacotes = [];
  for (let i = 1; i <= volumeIdx; i++) {
    const el = document.getElementById(`vol-${i}`);
    if (!el) continue;
    const qtd  = parseInt(document.getElementById(`qtd-${i}`)?.value) || 1;
    const peso = parseFloat(document.getElementById(`peso-${i}`)?.value) || 0;
    const alt  = parseFloat(document.getElementById(`alt-${i}`)?.value) || 0;
    const larg = parseFloat(document.getElementById(`larg-${i}`)?.value) || 0;
    const comp = parseFloat(document.getElementById(`comp-${i}`)?.value) || 0;
    if (peso <= 0) { toast(`Volume ${i}: informe o peso`, 'error'); return; }
    pacotes.push({ quantidade: qtd, peso_kg: peso, altura_cm: alt, largura_cm: larg, comprimento_cm: comp });
  }

  const res_div = document.getElementById('resultado-cotacao');
  res_div.innerHTML = `<div class="loading-area"><div class="spinner"></div> Consultando transportadoras...</div>`;

  const payload = { id_local, cep_destino: cep, cnpj_destinatario: cnpj, valor_nf, pacotes };

  try {
    const res = await fetch(`${EDGE_URL}/cotar-frete`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session?.access_token || SUPA_KEY}` },
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    await appLog('acao', 'Cotação de frete realizada', {
      categoria: 'cotacao',
      detalhe: { id_local, cep_destino: cep, valor_nf, pacotes: pacotes.length, resultados: data?.resultados?.length }
    });

    renderResultados(data, res_div);
  } catch(e) {
    await appLog('erro', 'Falha na cotação de frete', { categoria: 'cotacao', detalhe: e.message, payload });
    res_div.innerHTML = `<div class="card"><div class="empty-state"><div class="icon">❌</div><p>Erro ao cotar: ${e.message}</p></div></div>`;
    toast('Erro ao cotar frete: ' + e.message, 'error');
  }
}

function renderResultados(data, container) {
  const resultados = data?.resultados || [];
  if (!resultados.length) {
    container.innerHTML = `<div class="card"><div class="empty-state"><div class="icon">🔍</div><p>Nenhuma cotação retornada. Verifique CEP e local de expedição.</p></div></div>`;
    return;
  }

  // Ordena por valor (erros no final)
  const ok  = resultados.filter(r => !r.erro).sort((a,b) => (a.valor_total||0) - (b.valor_total||0));
  const err = resultados.filter(r => r.erro);
  const ordered = [...ok, ...err];

  let html = `<div class="card"><div class="card-title">🏆 Resultado das Cotações</div>`;

  if (data.cidade_destino || data.uf_destino) {
    html += `<div class="mb-4 flex gap-3 flex-wrap">
      <span class="tag">📍 ${data.cidade_destino || ''} / ${data.uf_destino || ''}</span>
      <span class="tag">⚖️ ${fmtNum(data.peso_total_kg)} kg</span>
      ${data.peso_cubado_kg ? `<span class="tag">📦 Cubado: ${fmtNum(data.peso_cubado_kg)} kg</span>` : ''}
    </div>`;
  }

  html += `<div class="result-grid">`;
  ordered.forEach((r, idx) => {
    if (r.erro) {
      html += `<div class="result-card error-card">
        <div class="transp">${r.transportadora}</div>
        <div class="preco">Indisponível</div>
        <div class="detalhe">${r.erro}</div>
      </div>`;
    } else {
      const isWinner = idx === 0;
      html += `<div class="result-card${isWinner?' winner':''}">
        ${isWinner ? '<span class="badge-winner">✅ Menor Preço</span>' : ''}
        <div class="transp">${r.transportadora}</div>
        <div class="prazo">⏱️ ${r.prazo_dias ?? '?'} dia(s) úteis</div>
        <div class="preco">${fmt(r.valor_total)}</div>
        ${r.valor_frete   ? `<div class="detalhe">Frete: ${fmt(r.valor_frete)}</div>` : ''}
        ${r.valor_pedagio ? `<div class="detalhe">Pedágio: ${fmt(r.valor_pedagio)}</div>` : ''}
        ${r.valor_gris    ? `<div class="detalhe">GRIS: ${fmt(r.valor_gris)}</div>` : ''}
      </div>`;
    }
  });

  html += `</div></div>`;
  container.innerHTML = html;
}

function statusBadge(s) {
  const m = { pendente: 'badge-warn', ok: 'badge-ok', divergencia: 'badge-danger', contestado: 'badge-blue', sem_vinculo: 'badge-gray' };
  return `<span class="badge ${m[s]||'badge-gray'}">${s}</span>`;
}

function renderLinhasCTe(ctes) {
  if (!ctes.length) return `<tr><td colspan="11"><div class="empty-state"><div class="icon">📭</div><p>Nenhum CTe encontrado</p></div></td></tr>`;
  return ctes.map(r => {
    const div = Number(r.divergencia || 0);
    const divClass = div > 0 ? 'text-red' : div < 0 ? 'text-green' : '';
    return `<tr>
      <td><strong>${r.num_cte||'—'}</strong></td>
      <td>${fmtDate(r.data_emissao)}</td>
      <td>${r.nome_transportadora||'—'}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.nome_destinatario||'—'}</td>
      <td>${r.uf_destino||'—'}</td>
      <td>${r.peso_kg ? fmtNum(r.peso_kg)+' kg' : '—'}</td>
      <td>${fmt(r.valor_frete_cte)}</td>

          <option value="pendente"  ${r.status_auditoria==='pendente'?'selected':''}>Pendente</option>
          <option value="ok"        ${r.status_auditoria==='ok'?'selected':''}>OK</option>
          <option value="divergencia" ${r.status_auditoria==='divergencia'?'selected':''}>Divergência</option>
          <option value="contestado" ${r.status_auditoria==='contestado'?'selected':''}>Contestado</option>
          <option value="sem_vinculo" ${r.status_auditoria==='sem_vinculo'?'selected':''}>Sem vínculo</option>
        </select>

  }).join('');
}

function filtrarCTes() {
  const c = document.getElementById('page-content');
  const ctes = c.__ctes || [];
  const statusFilt = document.getElementById('filter-status-audit')?.value || '';
  const transpFilt = document.getElementById('filter-transp-audit')?.value?.toLowerCase() || '';
  const filtered = ctes.filter(r => {
    const matchStatus = !statusFilt || r.status_auditoria === statusFilt;
    const matchTransp = !transpFilt || (r.nome_transportadora||'').toLowerCase().includes(transpFilt);
    return matchStatus && matchTransp;
  });
  const tbody = document.getElementById('tbody-auditoria');
  if (tbody) tbody.innerHTML = renderLinhasCTe(filtered);
}

async function atualizarStatusCTe(id, status) {
  try {
    await fetch(`${SUPA_URL}/rest/v1/frt_conhecimentos?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...headers(session?.access_token), 'Prefer': 'return=minimal' },
      body: JSON.stringify({ status_auditoria: status, atualizado_em: new Date().toISOString() })
    });
    await appLog('acao', `Status CTe #${id} alterado para "${status}"`, { categoria: 'auditoria', detalhe: { id, status } });
    toast(`Status atualizado para "${status}"`, 'success');
    const c = document.getElementById('page-content');
    if (c.__ctes) {
      const cte = c.__ctes.find(x => x.id === id);
      if (cte) cte.status_auditoria = status;
    }
  } catch(e) {
    await appLog('erro', `Falha ao atualizar status CTe #${id}`, { categoria: 'auditoria', detalhe: e.message });
    toast('Erro ao atualizar: ' + e.message, 'error');
  }
}

const SQL_CREATE_LOGS = `CREATE TABLE IF NOT EXISTS frt_logs (
  id          BIGSERIAL PRIMARY KEY,
  tipo        TEXT NOT NULL DEFAULT 'acao'
              CHECK (tipo IN ('acao','erro','aviso')),
  categoria   TEXT,
  descricao   TEXT NOT NULL,
  detalhe     JSONB,
  usuario     TEXT,
  criado_em   TIMESTAMPTZ DEFAULT NOW()
);

-- Índices para performance
CREATE INDEX IF NOT EXISTS idx_frt_logs_tipo ON frt_logs (tipo);
CREATE INDEX IF NOT EXISTS idx_frt_logs_criado_em ON frt_logs (criado_em DESC);

-- RLS permissivo (ajuste conforme necessidade)
ALTER TABLE frt_logs ENABLE ROW LEVEL SECURITY;
CREATE POLICY "frt_logs_all" ON frt_logs FOR ALL USING (true) WITH CHECK (true);
GRANT ALL ON frt_logs TO anon, authenticated;
GRANT USAGE, SELECT ON SEQUENCE frt_logs_id_seq TO anon, authenticated;`;

function renderItensLog(logs) {
  if (!logs.length) return `<div class="empty-state"><div class="icon">✅</div><p>Nenhum log registrado</p></div>`;
  return logs.map((l, i) => {
    const icons = { erro: '❌', acao: '✅', aviso: '⚠️' };
    const cat = l.detalhe?.categoria || l.categoria || '';
    const detalheStr = l.detalhe ? JSON.stringify(l.detalhe, null, 2) : '';
    return `
      <div class="log-item log-${l.tipo}" onclick="toggleLogDetail(${i})">
        <div class="log-icon">${icons[l.tipo]||'ℹ️'}</div>
        <div class="log-body">
          <div class="log-desc">${l.descricao}</div>
          <div class="log-meta">
            <span>⏰ ${fmtDatetime(l.criado_em)}</span>
            ${cat ? `<span>📁 ${cat}</span>` : ''}
            ${l.usuario ? `<span>👤 ${l.usuario}</span>` : ''}
            <span class="badge ${l.tipo==='erro'?'badge-danger':l.tipo==='aviso'?'badge-warn':'badge-ok'}">${l.tipo}</span>
          </div>
          ${detalheStr ? `<div class="log-detail" id="log-detail-${i}">${detalheStr}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function toggleLogDetail(i) {
  const el = document.getElementById(`log-detail-${i}`);
  if (el) el.classList.toggle('open');
}

function filtrarLogs() {
  const c = document.getElementById('page-content');
  const logs = c.__logs || [];
  const tipo = document.getElementById('log-filter-tipo')?.value || '';
  const cat  = document.getElementById('log-filter-cat')?.value || '';
  const txt  = document.getElementById('log-filter-text')?.value?.toLowerCase() || '';
  const filtered = logs.filter(l => {
    const matchTipo = !tipo || l.tipo === tipo;
    const matchCat  = !cat  || (l.detalhe?.categoria || l.categoria || '') === cat;
    const matchTxt  = !txt  || (l.descricao||'').toLowerCase().includes(txt);
    return matchTipo && matchCat && matchTxt;
  });
  const el = document.getElementById('logs-list');
  if (el) el.innerHTML = renderItensLog(filtered);
}

async function limparLogs() {
  if (!confirm('Excluir logs com mais de 30 dias?')) return;
  try {
    const cutoff = new Date(Date.now() - 30 * 86400000).toISOString();
    await fetch(`${SUPA_URL}/rest/v1/frt_logs?criado_em=lt.${cutoff}`, {
      method: 'DELETE',
      headers: { ...headers(session?.access_token) }
    });
    toast('Logs antigos removidos ✅', 'success');
    await appLog('acao', 'Limpeza de logs antigos realizada', { categoria: 'sistema' });
    renderLogs();
  } catch(e) {
    toast('Erro ao limpar: ' + e.message, 'error');
  }
}

document.getElementById('auth-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') fazerLogin();
});
document.getElementById('auth-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('auth-pass').focus();
});
